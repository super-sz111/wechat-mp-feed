[project]
name = "wechat-mp-feed"
version = "0.1.0"
description = "Local-first toolkit for reviewable WeChat Official Account source management and article feed generation."
readme = "../../README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
dependencies = []
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
  "Topic :: Text Processing :: Linguistic",
]

[project.optional-dependencies]
ocr = [
  "imageio-ffmpeg>=0.5",
  "opencv-python-headless>=4.8",
  "paddlepaddle>=2.6",
  "pillow>=10",
  "paddleocr>=2.7",
]

[project.scripts]
mpfeed = "wechat_mp_feed.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
