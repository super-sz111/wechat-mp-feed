<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" role="img" aria-labelledby="title desc">
  <title id="title">wechat-mp-feed system overview</title>
  <desc id="desc">Agent-first workflow connecting users, AI agents, the mpfeed CLI, a local SQLite store, a user-operated downloader, WeChat Official Accounts, and finance feed outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#24292f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1f2328" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #fffdf8; }
      .title { font: 700 28px "Inter", "Segoe UI", sans-serif; fill: #1f2328; }
      .label { font: 700 19px "Inter", "Segoe UI", sans-serif; fill: #1f2328; }
      .small { font: 500 13px "Inter", "Segoe UI", sans-serif; fill: #57606a; }
      .box { stroke: #24292f; stroke-width: 2.4; filter: url(#shadow); }
      .rough { fill: none; stroke: #24292f; stroke-width: 1.2; opacity: .55; }
      .arrow { fill: none; stroke: #24292f; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .slogan { font: 800 18px "Inter", "Segoe UI", sans-serif; fill: #6e4f00; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="460" rx="24"/>
  <text x="54" y="58" class="title">Agent-first feed infrastructure</text>
  <text x="54" y="434" class="slogan">local · reviewable · finance-ready</text>

  <g transform="translate(54 132)">
    <rect class="box" x="0" y="0" width="154" height="92" rx="20" fill="#dff7ef"/>
    <path class="rough" d="M8 8 C44 2,102 4,145 10 M148 20 C152 46,151 68,145 84 M137 89 C96 94,47 93,10 86 M5 72 C1 45,2 21,9 8"/>
    <text x="77" y="40" text-anchor="middle" class="label">User</text>
    <text x="77" y="64" text-anchor="middle" class="small">review + auth</text>
  </g>

  <g transform="translate(260 132)">
