<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">首次批量接入流程</title>
  <desc id="desc">从名单、截图、录屏或文章链接开始，经过导入、OCR 清洗、多轮搜索、最新文章证据、金融分类、用户审核、正式来源库和 feed 运行。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#24292f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1f2328" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #fffdf8; }
      .title { font: 700 28px "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2328; }
      .label { font: 700 17px "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2328; }
      .small { font: 500 13px "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #57606a; }
      .box { stroke: #24292f; stroke-width: 2.4; filter: url(#shadow); }
      .rough { fill: none; stroke: #24292f; stroke-width: 1.2; opacity: .55; }
      .arrow { fill: none; stroke: #24292f; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 8; }
      .tag { font: 700 12px "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #57606a; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="560" rx="24"/>
  <text x="54" y="58" class="title">首次批量接入</text>
  <text x="54" y="88" class="small">批量关注列表按阶段自动处理；人工审核集中在账号身份、分类置信度和手工修正行。</text>

  <g transform="translate(54 145)">
    <rect class="box" x="0" y="0" width="184" height="98" rx="20" fill="#dff7ef"/>
    <path class="rough" d="M9 9 C54 2,131 3,177 10 M181 25 C188 54,184 78,176 90 M161 96 C115 101,56 98,10 90 M4 74 C1 45,2 22,9 9"/>
    <text x="92" y="35" text-anchor="middle" class="label">账号输入</text>
    <text x="92" y="59" text-anchor="middle" class="small">CSV / JSON / 截图</text>
    <text x="92" y="78" text-anchor="middle" class="small">录屏 / 文章链接</text>
  </g>

  <g transform="translate(298 145)">
    <rect class="box" x="0" y="0" width="164" height="98" rx="20" fill="#e8f1ff"/>
    <path class="rough" d="M9 8 C48 2,116 3,156 9 M160 24 C166 53,164 77,156 90 M143 96 C101 100,52 98,9 90 M5 73 C1 44,2 20,9 8"/>
    <text x="82" y="37" text-anchor="middle" class="label">导入</text>
    <text x="82" y="61" text-anchor="middle" class="small">OCR 清洗</text>
    <text x="82" y="79" text-anchor="middle" class="small">名称标准化</text>
  </g>

  <g transform="translate(522 145)">
    <rect class="box" x="0" y="0" width="172" height="98" rx="20" fill="#fff1e5"/>
    <path class="rough" d="M9 8 C50 2,122 3,165 10 M168 24 C174 53,171 76,164 90 M151 96 C108 101,55 98,10 89 M5 74 C1 45,3 21,9 8"/>
    <text x="86" y="36" text-anchor="middle" class="label">多轮</text>
    <text x="86" y="60" text-anchor="middle" class="label">公众号搜索</text>
    <text x="86" y="80" text-anchor="middle" class="small">优先严格匹配</text>
  </g>

  <g transform="translate(754 145)">
    <rect class="box" x="0" y="0" width="180" height="98" rx="20" fill="#fbefff"/>
    <path class="rough" d="M10 9 C52 2,128 3,172 10 M176 25 C183 54,179 78,171 90 M156 96 C113 101,57 99,10 89 M5 75 C1 45,3 22,10 9"/>
    <text x="90" y="36" text-anchor="middle" class="label">最新文章</text>
    <text x="90" y="60" text-anchor="middle" class="label">证据抓取</text>
    <text x="90" y="80" text-anchor="middle" class="small">标题 / 链接 / 日期</text>
  </g>

  <g transform="translate(754 334)">
    <rect class="box" x="0" y="0" width="180" height="98" rx="20" fill="#fff8c5"/>
    <path class="rough" d="M10 9 C51 2,130 3,173 10 M176 25 C182 54,179 78,171 90 M157 96 C113 101,56 99,10 89 M5 75 C1 45,3 22,10 9"/>
    <text x="90" y="36" text-anchor="middle" class="label">金融分类</text>
    <text x="90" y="60" text-anchor="middle" class="small">分类体系</text>
    <text x="90" y="80" text-anchor="middle" class="small">+ LLM 复核</text>
  </g>

  <g transform="translate(498 334)">
    <rect class="box" x="0" y="0" width="196" height="98" rx="20" fill="#ffeef0"/>
    <path class="rough" d="M9 9 C58 2,139 3,188 10 M192 25 C199 54,195 78,187 90 M171 96 C121 101,61 99,10 89 M4 75 C1 45,2 22,9 9"/>
    <text x="98" y="36" text-anchor="middle" class="label">审核表</text>
    <text x="98" y="60" text-anchor="middle" class="small">只突出不确定行</text>
    <text x="98" y="79" text-anchor="middle" class="small">支持人工修正</text>
  </g>

  <g transform="translate(272 334)">
    <rect class="box" x="0" y="0" width="166" height="98" rx="20" fill="#e6ffec"/>
    <path class="rough" d="M9 9 C49 2,118 3,159 10 M163 25 C169 54,166 78,158 90 M145 96 C103 101,53 98,10 89 M5 75 C1 45,2 22,9 9"/>
    <text x="83" y="37" text-anchor="middle" class="label">正式</text>
    <text x="83" y="61" text-anchor="middle" class="label">来源库</text>
    <text x="83" y="80" text-anchor="middle" class="small">已确认公众号</text>
  </g>

  <g transform="translate(54 334)">
    <rect class="box" x="0" y="0" width="158" height="98" rx="20" fill="#f6f8fa"/>
    <path class="rough" d="M9 9 C47 2,112 3,151 10 M154 25 C161 54,157 78,150 90 M137 96 C98 101,50 98,10 89 M4 75 C1 45,2 22,9 9"/>
    <text x="79" y="40" text-anchor="middle" class="label">Feed 运行</text>
    <text x="79" y="64" text-anchor="middle" class="small">刷新 + 导出</text>
  </g>

  <path class="arrow" d="M244 194 C262 191,276 191,292 194"/>
  <path class="arrow" d="M468 194 C487 191,503 191,516 194"/>
  <path class="arrow" d="M700 194 C720 191,736 191,748 194"/>
  <path class="arrow" d="M846 250 C850 280,850 303,846 328"/>
  <path class="arrow" d="M748 383 C731 381,714 381,700 383"/>
  <path class="arrow" d="M492 383 C473 381,456 381,444 383"/>
  <path class="arrow" d="M266 383 C247 381,231 381,218 383"/>
  <path class="arrow dash" d="M610 250 C602 286,604 311,616 328"/>
  <text x="590" y="295" class="tag">严格匹配</text>
  <path class="arrow dash" d="M690 432 C697 472,631 493,520 489 C393 486,336 460,344 438"/>
  <text x="519" y="509" text-anchor="middle" class="tag">审核后的修正回写来源库</text>
</svg>
